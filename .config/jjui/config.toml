[preview]
revision_command = ["util", "exec", "--", "jjui-tools", "pr-preview", "$change_id"]
evolog_command = ["evolog", "--color", "always", "-r", "$commit_id", "-p", "-n", "1"]
oplog_command = ["op", "show", "$operation_id", "--color", "always"]
file_command = ["diff", "--color", "always", "-r", "$change_id", "$file"]
position = "auto"
show_at_start = true
width_percentage = 50.0
width_increment_percentage = 5.0

[[actions]]
name = "fetch-and-rebase"
lua = '''
flash("Fetching tracked bookmarks...")
local out1, err1 = jj("git", "fetch", "--tracked")

if err1 and #err1 > 0 then
  flash({ text = "Fetch failed:\n" .. err1, error = true, sticky = true })
  return
end
flash(out1)

flash("Rebasing onto main (skip-emptied)...")
local out2, err2 = jj("rebase", "-b", "@", "--skip-emptied", "-o", "main")

if err2 and #err2 > 0 then
  flash({ text = "Rebase failed:\n" .. err2, error = true, sticky = true })
  return
end
flash(out2)

revisions.refresh()
'''

[[bindings]]
action = "fetch-and-rebase"
key = "F"
scope = "revisions"
desc = "fetch tracked + rebase onto main"
