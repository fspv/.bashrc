[preview]
revision_command = ["util", "exec", "--", "jjui-tools", "pr-preview", "$change_id"]
evolog_command = ["evolog", "--color", "always", "-r", "$commit_id", "-p", "-n", "1"]
oplog_command = ["op", "show", "$operation_id", "--color", "always"]
file_command = ["diff", "--color", "always", "-r", "$change_id", "$file"]
position = "auto"
show_at_start = true
width_percentage = 50.0
width_increment_percentage = 5.0

[[actions]]
name = "fetch-and-rebase"
lua = '''
jj_async("git", "fetch", "--tracked")
jj_async("rebase", "-b", "@", "--skip-emptied", "-o", "main")
revisions.refresh()
'''

[[bindings]]
action = "fetch-and-rebase"
key = "F"
scope = "revisions"
desc = "fetch tracked + rebase onto main"
