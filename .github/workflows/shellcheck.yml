name: ShellCheck

on:
  push:
    branches:
      - master
    paths:
      - '**/*.sh'
      - '**/*.bash'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    branches:
      - master
    paths:
      - '**/*.sh'
      - '**/*.bash'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          git ls-files -z | xargs -0 file --mime-type | awk -F: '$2 ~ /text\/x-shellscript/ {print $1}' | grep -v '^\.config/zsh/' | xargs shellcheck
