name: ShellCheck

on:
  push:
    branches:
      - master
    paths:
      - '**/*.sh'
      - '**/*.bash'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    branches:
      - master
    paths:
      - '**/*.sh'
      - '**/*.bash'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          ignore_paths: .config/zsh
