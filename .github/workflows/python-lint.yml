name: Python Lint

on:
  push:
    branches:
      - master
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/python-lint.yml'
  pull_request:
    branches:
      - master
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/python-lint.yml'

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff format check
        if: always()
        run: ruff format --check .

      - name: Ruff lint
        if: always()
        run: ruff check .

      - name: Mypy strict
        if: always()
        run: mypy --strict .config/i3/scripts/window-binded-layout.py .config/sway/scripts/window-bound-layout.py .config/waybar/scripts/moon-phase.py .config/waybar/scripts/zodiac.py
