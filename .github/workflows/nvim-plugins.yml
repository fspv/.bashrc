name: Neovim Plugin Smoke Test

on:
  push:
    branches:
      - master
    paths:
      - '.config/nvim/**'
  pull_request:
    branches:
      - master
    paths:
      - '.config/nvim/**'

jobs:
  nvim-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      BWRAPPED: "1"
      NEOVIM_LAZY_PATH: /tmp/lazy-nvim
      XDG_CONFIG_HOME: ${{ github.workspace }}/.config
      XDG_DATA_HOME: /tmp/nvim-data
      XDG_STATE_HOME: /tmp/nvim-state
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install neovim
        run: |
          curl -fsSL \
            https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
            -o /tmp/nvim.tar.gz
          sudo tar -xzf /tmp/nvim.tar.gz \
            -C /usr/local --strip-components=1
          nvim --version | head -1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake make

      - name: Install lazy.nvim
        run: |
          git clone --filter=blob:none --branch=stable \
            https://github.com/folke/lazy.nvim.git \
            /tmp/lazy-nvim

      - name: Install plugins
        run: |
          nvim --headless +"lua require('lazy').install({ wait = true })" +qa

      - name: Install treesitter parsers
        run: |
          nvim --headless \
            +"TSInstallSync lua go python rust javascript" +qa

      - name: Verify config loads and plugins are healthy
        run: |
          nvim --headless +"lua <<EOF
          local ok, err = pcall(function()
            assert(
              package.loaded['lazy'],
              'lazy.nvim not loaded'
            )

            local lazy_stats = require('lazy').stats()
            local loaded = lazy_stats.loaded
            local count = lazy_stats.count

            print(
              string.format(
                'Lazy stats: %d/%d plugins loaded',
                loaded,
                count
              )
            )

            if count == 0 then
              error('No plugins found')
            end

            local start_ok = lazy_stats.startuptime ~= nil
            print(
              string.format(
                'Startup time: %s',
                start_ok and tostring(lazy_stats.startuptime) .. 'ms'
                  or 'N/A'
              )
            )

            -- Check that key plugins loaded without errors
            local required_plugins = {
              'blink.cmp',
              'gitsigns',
              'telescope',
              'nvim-treesitter',
              'lualine.nvim',
              'neo-tree.nvim',
              'flash.nvim',
              'bufferline.nvim',
              'conform.nvim',
            }

            for _, name in ipairs(required_plugins) do
              local plugin = require('lazy.core.config').plugins[name]
              if not plugin then
                error('Plugin not found: ' .. name)
              end
              if plugin._.has_errors then
                error('Plugin has errors: ' .. name)
              end
              print('OK: ' .. name)
            end
          end)

          if not ok then
            print('FAIL: ' .. tostring(err))
            vim.cmd('cquit 1')
          else
            print('All checks passed')
            vim.cmd('quit')
          end
          EOF
          "
