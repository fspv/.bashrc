name: Neovim Plugin Smoke Test

on:
  push:
    branches:
      - master
    paths:
      - '.config/nvim/**'
  pull_request:
    branches:
      - master
    paths:
      - '.config/nvim/**'

jobs:
  nvim-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test container
        run: |
          cat > /tmp/Dockerfile.nvim-test << 'DEOF'
          FROM ubuntu:24.04
          RUN apt-get update -qq && \
              apt-get install -y -qq \
                curl git cmake make gcc \
                nodejs npm ca-certificates && \
              curl -fsSL \
                https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
                | tar -xz -C /usr/local --strip-components=1 && \
              npm install -g tree-sitter-cli && \
              git clone --filter=blob:none --branch=stable \
                https://github.com/folke/lazy.nvim.git \
                /tmp/lazy-nvim && \
              apt-get clean
          DEOF
          docker build -t nvim-test -f /tmp/Dockerfile.nvim-test /tmp

      - name: Install plugins
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/root" \
            -w /root \
            -e BWRAPPED=1 \
            -e NEOVIM_LAZY_PATH=/tmp/lazy-nvim \
            -e HOME=/root \
            nvim-test \
            nvim --headless \
              +"lua require('lazy').install({ wait = true })" \
              +qa

      - name: Install treesitter parsers
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/root" \
            -w /root \
            -e BWRAPPED=1 \
            -e NEOVIM_LAZY_PATH=/tmp/lazy-nvim \
            -e HOME=/root \
            nvim-test \
            nvim --headless \
              +"lua vim.cmd('TSInstall! lua go python rust javascript')" \
              +qa

      - name: Verify config loads and plugins are healthy
        run: |
          cat > /tmp/nvim-verify.lua << 'LUAEOF'
          local ok, err = pcall(function()
            assert(package.loaded['lazy'], 'lazy.nvim not loaded')

            local stats = require('lazy').stats()
            print(string.format(
              'Lazy stats: %d/%d plugins loaded',
              stats.loaded, stats.count
            ))

            if stats.count == 0 then
              error('No plugins found')
            end

            local required = {
              'blink.cmp',
              'gitsigns.nvim',
              'telescope.nvim',
              'nvim-treesitter',
              'lualine.nvim',
              'neo-tree.nvim',
              'flash.nvim',
              'bufferline.nvim',
              'conform.nvim',
            }

            for _, name in ipairs(required) do
              local p = require('lazy.core.config').plugins[name]
              if not p then
                error('Plugin not found: ' .. name)
              end
              if p._.has_errors then
                error('Plugin has errors: ' .. name)
              end
              print('OK: ' .. name)
            end
          end)

          if not ok then
            print('FAIL: ' .. tostring(err))
            vim.cmd('cquit 1')
          else
            print('All checks passed')
            vim.cmd('quit')
          end
          LUAEOF

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/root" \
            -v "/tmp/nvim-verify.lua:/tmp/nvim-verify.lua:ro" \
            -w /root \
            -e BWRAPPED=1 \
            -e NEOVIM_LAZY_PATH=/tmp/lazy-nvim \
            -e HOME=/root \
            nvim-test \
            nvim --headless +"luafile /tmp/nvim-verify.lua"
