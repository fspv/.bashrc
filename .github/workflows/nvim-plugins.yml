name: Neovim Plugin Smoke Test

on:
  push:
    branches:
      - master
    paths:
      - '.config/nvim/**'
  pull_request:
    branches:
      - master
    paths:
      - '.config/nvim/**'

jobs:
  nvim-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test container
        run: |
          cat > /tmp/Dockerfile.nvim-test << 'DEOF'
          FROM ubuntu:24.04
          RUN apt-get update -qq && \
              apt-get install -y -qq \
                curl git cmake build-essential \
                nodejs npm ca-certificates && \
              curl -fsSL \
                https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
                | tar -xz -C /usr/local --strip-components=1 && \
              npm install -g tree-sitter-cli && \
              git clone --filter=blob:none --branch=stable \
                https://github.com/folke/lazy.nvim.git \
                /tmp/lazy-nvim && \
              apt-get clean
          DEOF
          docker build -t nvim-test -f /tmp/Dockerfile.nvim-test /tmp

      - name: Install plugins and verify
        run: |
          cat > /tmp/nvim-smoke.lua << 'LUAEOF'
          require('lazy').install({ wait = true })

          local errors = {}
          for name, plugin in pairs(require('lazy.core.config').plugins) do
            if plugin._.has_errors then
              table.insert(errors, name)
            end
          end

          if #errors > 0 then
            print('FAIL: ' .. table.concat(errors, ', '))
            vim.cmd('cquit 1')
          end

          local s = require('lazy').stats()
          print(string.format(
            'OK: %d/%d plugins loaded', s.loaded, s.count
          ))
          vim.cmd('quit')
          LUAEOF

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/root" \
            -v "/tmp/nvim-smoke.lua:/tmp/nvim-smoke.lua:ro" \
            -w /root \
            -e BWRAPPED=1 \
            -e NEOVIM_LAZY_PATH=/tmp/lazy-nvim \
            -e HOME=/root \
            nvim-test \
            nvim --headless +"luafile /tmp/nvim-smoke.lua"
