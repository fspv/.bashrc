name: Neovim Plugin Smoke Test

on:
  push:
    branches:
      - master
    paths:
      - '.config/nvim/**'
  pull_request:
    branches:
      - master
    paths:
      - '.config/nvim/**'

jobs:
  nvim-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      BWRAPPED: "1"
      NEOVIM_LAZY_PATH: /tmp/lazy-nvim
      XDG_CONFIG_HOME: ${{ github.workspace }}/.config
      XDG_DATA_HOME: /tmp/nvim-data
      XDG_STATE_HOME: /tmp/nvim-state
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install neovim
        run: |
          curl -fsSL \
            https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
            -o /tmp/nvim.tar.gz
          sudo tar -xzf /tmp/nvim.tar.gz \
            -C /usr/local --strip-components=1
          nvim --version | head -1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake make

      - name: Install lazy.nvim
        run: |
          git clone --filter=blob:none --branch=stable \
            https://github.com/folke/lazy.nvim.git \
            /tmp/lazy-nvim

      - name: Install plugins
        run: |
          nvim --headless \
            +"lua require('lazy').install({ wait = true })" \
            +qa 2>&1 | tee /tmp/nvim-install.log

      - name: Install treesitter parsers
        run: |
          nvim --headless \
            +"TSInstallSync lua go python rust javascript" \
            +qa 2>&1 | tee /tmp/nvim-treesitter.log

      - name: Verify config loads without errors
        run: |
          nvim --headless \
            +"lua print('CONFIG_OK')" \
            +qa 2>&1 | tee /tmp/nvim-verify.log

          if grep -iq "^Error\|^E[0-9]\|Failed to run" \
              /tmp/nvim-verify.log; then
            echo "::error::Errors detected loading config:"
            cat /tmp/nvim-verify.log
            exit 1
          fi

          if ! grep -q "CONFIG_OK" /tmp/nvim-verify.log; then
            echo "::error::Config failed to load"
            cat /tmp/nvim-verify.log
            exit 1
          fi

          echo "Config loaded successfully"

      - name: Check all plugin logs for errors
        if: always()
        run: |
          exit_code=0
          for log in /tmp/nvim-install.log \
                     /tmp/nvim-treesitter.log \
                     /tmp/nvim-verify.log; do
            if [ -f "$log" ] && \
                grep -iq "^Error\|^E[0-9]\|Failed to run" "$log"
            then
              echo "::error::Errors in $log:"
              grep -i "^Error\|^E[0-9]\|Failed to run" "$log"
              exit_code=1
            fi
          done
          exit $exit_code
