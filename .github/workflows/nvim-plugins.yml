name: Neovim Plugin Smoke Test

on:
  push:
    branches:
      - master
    paths:
      - '.config/nvim/**'
  pull_request:
    branches:
      - master
    paths:
      - '.config/nvim/**'

jobs:
  nvim-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test container
        run: |
          cat > /tmp/Dockerfile.nvim-test << 'DEOF'
          FROM ubuntu:24.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && \
              apt-get install -y \
                curl git cmake build-essential \
                nodejs npm ca-certificates && \
              curl -fsSL \
                https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz \
                | tar -xz -C /usr/local --strip-components=1 && \
              TS_VERSION=$(curl -fsSL https://api.github.com/repos/tree-sitter/tree-sitter/releases/latest | grep -o '"tag_name": "v[^"]*"' | head -1 | grep -o '[0-9.]*') && \
              curl -fsSL "https://github.com/tree-sitter/tree-sitter/releases/download/v${TS_VERSION}/tree-sitter-linux-x64.gz" \
                | gunzip > /usr/local/bin/tree-sitter && \
              chmod +x /usr/local/bin/tree-sitter && \
              tree-sitter --version && \
              git clone --filter=blob:none --branch=stable \
                https://github.com/folke/lazy.nvim.git \
                /tmp/lazy-nvim && \
              apt-get clean
          DEOF
          docker build -t nvim-test -f /tmp/Dockerfile.nvim-test /tmp

      - name: Install plugins and verify
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/root" \
            -w /root \
            -e BWRAPPED=1 \
            -e NEOVIM_LAZY_PATH=/tmp/lazy-nvim \
            -e HOME=/root \
            nvim-test \
            nvim --headless +"luafile ~/.config/nvim/lua/smoke_test.lua"
