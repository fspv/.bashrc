name: Build Nix Develop

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - '**/*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - '**/*.md'

jobs:
  build-ubuntu-24-04:
    runs-on: ubuntu-24.04
    steps:
      - name: Remove old repo
        run: ls -lah . && rm -rf * .[a-zA-Z]*
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
      - name: Checkout repository
        uses: taiki-e/checkout-action@v1
      - name: Set up Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Remove Nix Garbage
        run: nix-collect-garbage -d
      - name: Build nix develop environment
        run: |
          nix develop --ignore-environment --command echo "Nix develop initialised successfully!"
      - name: Test bash
        run: |
          nix develop --ignore-environment --command bash -c 'echo hello'
      - name: Test zsh
        run: |
          nix develop --ignore-environment --command zsh -c 'echo hello'
      - name: Remove Nix Garbage
        run: nix-collect-garbage -d
